identity:
  author: "aosom"
  name: "aosom-lark-spreadsheet"
  label:
    en_US: "aosom Lark Spreadsheet"
    zh_Hans: "aosom 飞书电子表格"
  description:
    en_US: "Read and write Lark/Feishu spreadsheets"
    zh_Hans: "读写飞书电子表格"
  icon: "icon.svg"

credentials_for_provider:
  lark_app_id:
    type: text-input
    required: true
    label:
      en_US: Lark App ID
      zh_Hans: 飞书 App ID
    placeholder:
      en_US: Enter your Lark App ID
      zh_Hans: 输入飞书应用的 App ID
    help:
      en_US: Your Lark/Feishu application App ID from the open platform
      zh_Hans: 飞书开放平台应用的 App ID

  lark_app_secret:
    type: secret-input
    required: true
    label:
      en_US: Lark App Secret
      zh_Hans: 飞书 App Secret
    placeholder:
      en_US: Enter your Lark App Secret
      zh_Hans: 输入飞书应用的 App Secret
    help:
      en_US: Your Lark/Feishu application App Secret from the open platform
      zh_Hans: 飞书开放平台应用的 App Secret

  lark_base_url:
    type: select
    required: false
    default: "https://open.feishu.cn"
    label:
      en_US: API Base URL
      zh_Hans: API 地址
    help:
      en_US: Select the API endpoint for your region
      zh_Hans: 根据地区选择 API 地址
    options:
      - value: "https://open.feishu.cn"
        label:
          en_US: Chinese Mainland (Feishu)
          zh_Hans: 中国大陆 (飞书)
      - value: "https://open.larksuite.com"
        label:
          en_US: International (Lark)
          zh_Hans: 国际站 (Lark)

tools:
  - tools/get_metainfo.yaml
  - tools/add_sheet.yaml
  - tools/delete_sheet.yaml
  - tools/copy_sheet.yaml
  - tools/read_range.yaml
  - tools/write_range.yaml
  - tools/append_data.yaml
  - tools/delete_dimension.yaml
  - tools/quick_set_header_list.yaml
  - tools/quick_get_column_last_value.yaml
  - tools/quick_batch_update.yaml
  - tools/quick_batch_append.yaml
  - tools/quick_filter_columns.yaml
  - tools/write_multiple_range.yaml
  - tools/quick_clear_sheet.yaml
  - tools/quick_clear_sheet_content.yaml
extra:
  python:
    source: provider/aosom-lark-spreadsheet.py
