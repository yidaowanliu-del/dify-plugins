identity:
  name: quick_filter_columns
  author: aosom
  label:
    en_US: Filter Columns
    zh_Hans: 列过滤
description:
  human:
    en_US: Keep only specified columns, delete all others
    zh_Hans: 只保留指定列，删除其余列
  llm: Keep specified columns and delete all other columns from the sheet.
parameters:
- name: spreadsheet_token
  type: string
  required: true
  form: llm
  human_description:
    en_US: spreadsheet_token
    zh_Hans: spreadsheet_token
  label:
    en_US: spreadsheet_token
    zh_Hans: spreadsheet_token
- name: sheet_id
  type: string
  required: true
  form: llm
  human_description:
    en_US: sheet_id
    zh_Hans: sheet_id
  label:
    en_US: sheet_id
    zh_Hans: sheet_id
- name: keep_columns
  type: array
  required: true
  form: llm
  label:
    en_US: Keep Columns
    zh_Hans: 保留的列名
  llm_description: List of column header names to keep
  human_description:
    en_US: List of column header names to keep
    zh_Hans: List of column header names to keep
- name: data_start
  type: number
  required: false
  form: llm
  default: 2
  label:
    en_US: Data Start Row
  llm_description: Header row = data_start - 1 (default 2)
  human_description:
    en_US: Header row = data_start - 1 (default 2)
    zh_Hans: Header row = data_start - 1 (default 2)
extra:
  python:
    source: tools/quick_filter_columns.py
