identity:
  author: "aosom"
  name: "aosom-lark-bitable"
  label:
    en_US: "aosom Lark Bitable"
    zh_Hans: "aosom 飞书多维表格"
  description:
    en_US: "Search Lark/Feishu bitable records with filtering and pagination"
    zh_Hans: "搜索飞书多维表格记录，支持过滤、排序、分页"
  icon: "icon.svg"

credentials_for_provider:
  lark_app_id:
    type: text-input
    required: true
    label:
      en_US: Lark App ID
      zh_Hans: 飞书 App ID
    placeholder:
      en_US: Enter your Lark App ID
      zh_Hans: 输入飞书应用的 App ID
    help:
      en_US: Your Lark/Feishu application App ID from the open platform
      zh_Hans: 飞书开放平台应用的 App ID

  lark_app_secret:
    type: secret-input
    required: true
    label:
      en_US: Lark App Secret
      zh_Hans: 飞书 App Secret
    placeholder:
      en_US: Enter your Lark App Secret
      zh_Hans: 输入飞书应用的 App Secret
    help:
      en_US: Your Lark/Feishu application App Secret from the open platform
      zh_Hans: 飞书开放平台应用的 App Secret

  lark_base_url:
    type: select
    required: false
    default: "https://open.feishu.cn"
    label:
      en_US: API Base URL
      zh_Hans: API 地址
    help:
      en_US: Select the API endpoint for your region
      zh_Hans: 根据地区选择 API 地址
    options:
      - value: "https://open.feishu.cn"
        label:
          en_US: Chinese Mainland (Feishu)
          zh_Hans: 中国大陆 (飞书)
      - value: "https://open.larksuite.com"
        label:
          en_US: International (Lark)
          zh_Hans: 国际站 (Lark)

tools:
  - tools/lark_bitable.yaml
extra:
  python:
    source: provider/aosom-lark-bitable.py
